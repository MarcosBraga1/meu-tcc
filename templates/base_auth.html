<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Autenticação{% endblock %} | chatbot AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>

<body class="bg-slate-50 h-screen flex flex-col items-center justify-center relative">

    <div class="w-full max-w-md p-4">
        
        <div class="text-center mb-8">
            <p class="text-gray-500 mt-2">{% block subtitle %}Welcome back{% endblock %}</p>
            <h1 class="text-3xl font-bold">chatbot <span class="text-blue-600">AI</span></h1>
        </div>

        {% block content %}
        {% endblock %}

    </div>

    <footer class="absolute bottom-6 right-8 text-gray-400 text-xs">
        <p>Developed by <span class="font-semibold text-gray-600">Marcos Braga</span></p>
    </footer>

</body>
</html>
