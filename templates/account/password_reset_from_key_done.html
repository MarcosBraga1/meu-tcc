{% extends "base_auth.html" %}

{% block title %}Password changed{% endblock %}
{% block subtitle %}All set!{% endblock %}

{% block content %}

    <div class="text-center space-y-6">
        <div class="flex justify-center">
            <div class="bg-green-50 text-green-600 p-4 rounded-full">
                <i class="ph ph-check-circle text-4xl"></i>
            </div>
        </div>

        <div class="space-y-2">
            <h2 class="text-lg font-bold text-gray-800">Password Changed</h2>
            <p class="text-gray-600">
                Your password has been successfully updated. You can now log in with your new credentials.
            </p>
        </div>

        <div class="pt-4">
            <a href="{% url 'account_login' %}" 
               class="w-full block bg-black text-white py-3 rounded-xl font-bold hover:bg-gray-800 transition-all active:scale-95 shadow-md">
                Log in now
            </a>
        </div>
    </div>
    
{% endblock %}
