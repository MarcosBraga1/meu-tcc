{% extends "base_auth.html" %}
{% load socialaccount %}

{% block title %}Sign up{% endblock %}
{% block subtitle %}Get started with{% endblock %}

{% block content %}

    <a href="{% provider_login_url 'google' %}" 
        class="w-full flex items-center justify-center gap-3 bg-black text-white py-3 rounded-xl font-bold transition-all duration-300 hover:bg-gray-900 hover:shadow-xl active:scale-95">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20" class="brightness-110">    
        <span class="tracking-wide">Sign up with Google</span>
    </a>

    <div class="relative my-8">
        <div class="absolute inset-0 flex items-center" aria-hidden="true">
            <div class="w-full border-t border-gray-200"></div>
        </div>
        <div class="relative flex justify-center text-sm">
            <span class="bg-slate-50 px-3 text-gray-500">or</span>
        </div>
    </div>

    <form method="POST" action="{% url 'account_signup' %}" class="space-y-4">
        {% csrf_token %}
        
        <div class="relative group">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-400 group-focus-within:text-black transition-colors">
                <i class="ph ph-envelope text-xl"></i>
            </div>
            <input type="email" name="email" id="id_email" 
                placeholder="Your Email"
                class="bg-white w-full pl-12 pr-4 py-3 rounded-xl border border-gray-200 focus:ring-1 focus:ring-gray-300 focus:border-transparent outline-none transition shadow-sm">
        </div>

        <div class="relative group">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-400 group-focus-within:text-black transition-colors">
                <i class="ph ph-lock text-xl"></i>
            </div>
            <input type="password" name="password1" id="id_password1" 
                placeholder="Create Password"
                class="bg-white w-full pl-12 pr-4 py-3 rounded-xl border border-gray-200 focus:ring-1 focus:ring-gray-300 focus:border-transparent outline-none transition shadow-sm">
        </div>

        <div class="relative group">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-400 group-focus-within:text-black transition-colors">
                <i class="ph ph-lock-key text-xl"></i>
            </div>
            <input type="password" name="password2" id="id_password2" 
                placeholder="Confirm Password"
                class="bg-white w-full pl-12 pr-4 py-3 rounded-xl border border-gray-200 focus:ring-1 focus:ring-gray-300 focus:border-transparent outline-none transition shadow-sm">
        </div>

        <button type="submit" class="w-full bg-gray-100 border border-gray-200 shadow-sm text-black py-3 rounded-xl font- hover:bg-gray-200 transition-all active:scale-95">
            Create Account
        </button>
    </form>

    <div class="flex items-center justify-center gap-2 mt-8">
        <p class="text-gray-500 text-sm">Already have an account?</p>
        <a href="{% url 'account_login' %}" 
            class="text-sm text-black font-semibold hover:opacity-80 transition-opacity">
            Log in
        </a>
    </div>

{% endblock %}
